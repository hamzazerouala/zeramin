mode: ContinuousDeployment
assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatchBuild
increment: Inherit

branches:
  main:
    regex: ^(main|master)$
    increment: Patch
    prevent-increment-of-merged-branch-version: true
    tag: ''
  staging:
    regex: ^staging$
    increment: Minor
    tag: 'staging'
  develop:
    regex: ^develop$
    increment: Minor
    tag: 'dev'
  feature:
    regex: ^feature?[/-]
    increment: Patch
    tag: 'alpha'

ignore:
  sha: []

merge-message-formats: {}
