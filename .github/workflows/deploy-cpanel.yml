name: Deploy to cPanel

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, curl, intl, bcmath
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.testing .env
          php artisan key:generate

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse app --level=5 --no-progress
        continue-on-error: true

      - name: Run Pint (check)
        run: ./vendor/bin/pint --test
        continue-on-error: true

      - name: Run tests (SQLite in-memory)
        run: php artisan test

  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & build SPA
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE: /api
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}

      - name: Upload SPA build
        uses: actions/upload-artifact@v4
        with:
          name: spa-build
          path: public/spa

  deploy:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version (GitVersion)
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1
        with:
          useConfigFile: true
          configFilePath: ./GitVersion.yml

      - name: Download SPA build
        uses: actions/download-artifact@v4
        with:
          name: spa-build
          path: public/spa

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          DEPLOY_PATH: /home/${{ secrets.CPANEL_USER }}/public_html
        run: |
          ssh -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} \
            "cd $DEPLOY_PATH && \
             php artisan down --secret=${{ secrets.MAINTENANCE_SECRET }} || true && \
             git fetch origin && git reset --hard origin/main && \
             composer install --no-dev --optimize-autoloader --no-interaction && \
             php artisan migrate --force && \
             php artisan config:cache && php artisan route:cache && php artisan view:cache && \
             chmod -R 755 storage bootstrap/cache && \
             php artisan up"

      - name: Upload compiled SPA to server
        run: |
          rsync -az -e "ssh -p ${{ secrets.CPANEL_PORT }}" public/spa/ \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:/home/${{ secrets.CPANEL_USER }}/public_html/public/spa/

      - name: Smoke test
        run: curl -fsS ${{ secrets.APP_URL }}/api/health && echo " OK" || echo "Health check failed"

      - name: Tag release
        if: success()
        run: echo "Deployed version ${{ steps.gitversion.outputs.semVer }}"
